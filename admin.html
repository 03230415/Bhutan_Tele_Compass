<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — TeleCompass</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #082e36;
      color: #fff;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.4rem; }

    button.logout {
      padding: 0.5rem 1.2rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.logout:hover { background: rgba(255,255,255,0.1); }

    /* ── Today's notice banner ── */
    .today-banner {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: rgba(12,117,118,0.2);
      border: 1.5px solid rgba(12,117,118,0.5);
      border-radius: 12px;
      padding: 0.9rem 1.25rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.4s ease both;
    }
    .today-banner .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #0c7576;
      box-shadow: 0 0 8px #0c7576;
      flex-shrink: 0;
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }
    .today-banner .text { font-size: 0.92rem; color: #7de8e8; font-weight: 600; }
    .today-banner .text span { color: #fff; }

    .today-banner .view-btn {
      margin-left: auto;
      padding: 0.35rem 1rem;
      background: rgba(12,117,118,0.3);
      border: 1px solid #0c7576;
      border-radius: 50px;
      color: #7de8e8;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .today-banner .view-btn:hover { background: rgba(12,117,118,0.5); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Search / Filter / Sort row ── */
    .search-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-row input::placeholder { color: rgba(255,255,255,0.35); }
    .search-row input:focus { border-color: #0c7576; }

    .search-row select {
      padding: 0.6rem 1rem;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .search-row select option { background: #082e36; }

    .btn-clear-search {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-clear-search:hover { background: rgba(255,255,255,0.08); }

    .count {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    /* ── Message cards ── */
    .message-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
      transition: border 0.2s;
    }
    /* highlight today's messages with a subtle teal left border */
    .message-card.today {
      border-left: 3px solid #0c7576;
    }

    .message-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .message-card .name  { font-weight: 700; font-size: 1rem; }
    .message-card .email { color: #0c7576; font-size: 0.85rem; }
    .message-card .time  { color: rgba(255,255,255,0.35); font-size: 0.78rem; }

    .today-tag {
      display: inline-block;
      background: rgba(12,117,118,0.25);
      border: 1px solid #0c7576;
      color: #7de8e8;
      font-size: 0.68rem;
      padding: 0.1rem 0.5rem;
      border-radius: 50px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    .message-card .topic {
      display: inline-block;
      background: rgba(12,117,118,0.3);
      border: 1px solid #0c7576;
      color: #7de8e8;
      font-size: 0.72rem;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      margin-bottom: 0.6rem;
    }

    .message-card .body {
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .del-btn {
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.4);
      color: #ff6b6b;
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      font-size: 0.78rem;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    .del-btn:hover { background: rgba(255,80,80,0.3); }

    .clear-btn {
      margin-bottom: 1.5rem;
      padding: 0.5rem 1.4rem;
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.4);
      color: #ff6b6b;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .clear-btn:hover { background: rgba(255,80,80,0.3); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: rgba(255,255,255,0.3);
      margin-top: 4rem;
      font-size: 1rem;
    }

    /* ── Skeleton loading ── */
    .skeleton-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
    }
    .skeleton-line {
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 12px;
      margin-bottom: 0.6rem;
    }
    .skeleton-line.short  { width: 35%; }
    .skeleton-line.medium { width: 55%; }
    .skeleton-line.long   { width: 85%; }
    .skeleton-line.full   { width: 100%; }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <header>
    <h1>📬 TeleCompass — Admin</h1>
    <button class="logout" onclick="logout()">Logout →</button>
  </header>

  <button class="clear-btn" onclick="clearAll()">🗑 Clear All Messages</button>

  <!-- ── Today's notice ── -->
  <div class="today-banner" id="todayBanner">
    <div class="dot"></div>
    <div class="text">
      <span id="todayCount"></span> new message(s) received today
    </div>
    <button class="view-btn" onclick="filterToday()">View Today's →</button>
  </div>

  <!-- ── Search / Filter / Sort ── -->
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍 Search by name, email or message…" oninput="renderMessages()"/>

    <select id="filterTopic" onchange="renderMessages()">
      <option value="">All Topics</option>
      <option value="general">General Inquiry</option>
      <option value="research">Research Collaboration</option>
      <option value="telecom">Telecom Feedback</option>
      <option value="other">Other</option>
    </select>

    <select id="sortOrder" onchange="renderMessages()">
      <option value="newest">🕐 Newest First</option>
      <option value="oldest">🕑 Oldest First</option>
    </select>

    <button class="btn-clear-search" onclick="clearSearch()">✕ Clear</button>
  </div>

  <div class="count" id="count"></div>
  <div id="messages"></div>

  <script>
    let allMessages   = [];
    let showingToday  = false;

    // today's date in Bhutan time (UTC+6) as "YYYY-MM-DD"
    function getTodayBhutan() {
      const now = new Date();
      const bst = new Date(now.getTime() + 6 * 60 * 60 * 1000);
      return bst.toISOString().slice(0, 10);
    }

    function isToday(receivedAt) {
      return receivedAt && receivedAt.startsWith(getTodayBhutan());
    }

    // ── Skeletons ──────────────────────────────────
    function showSkeletons() {
      const box = document.getElementById("messages");
      document.getElementById("count").textContent = "Loading messages…";
      box.innerHTML = [1,2,3].map(() => `
        <div class="skeleton-card">
          <div style="display:flex; justify-content:space-between; margin-bottom:0.75rem;">
            <div style="width:40%;">
              <div class="skeleton-line short"></div>
              <div class="skeleton-line medium"></div>
            </div>
            <div class="skeleton-line" style="width:18%; height:10px; margin-top:4px;"></div>
          </div>
          <div class="skeleton-line" style="width:12%; height:18px; border-radius:50px; margin-bottom:0.75rem;"></div>
          <div class="skeleton-line long"></div>
          <div class="skeleton-line full"></div>
          <div class="skeleton-line medium"></div>
        </div>
      `).join("");
    }

    // ── Load from server ───────────────────────────
    async function loadMessages() {
      showSkeletons();
      const res = await fetch("/messages");
      if (res.status === 401) { window.location.href = "/login"; return; }
      const data = await res.json();
      allMessages = data.messages;

      // show today banner if there are messages today
      const todayMsgs = allMessages.filter(m => isToday(m.receivedAt));
      if (todayMsgs.length > 0) {
        document.getElementById("todayCount").textContent = todayMsgs.length;
        document.getElementById("todayBanner").style.display = "flex";
      }

      renderMessages();
    }

    // ── Filter to today only ───────────────────────
    function filterToday() {
      showingToday = true;
      document.getElementById("searchInput").value = "";
      document.getElementById("filterTopic").value = "";
      document.getElementById("sortOrder").value   = "newest";
      renderMessages();
    }

    // ── Render messages ────────────────────────────
    function renderMessages() {
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      const topic = document.getElementById("filterTopic").value.toLowerCase();
      const sort  = document.getElementById("sortOrder").value;
      const box   = document.getElementById("messages");

      let filtered = [...allMessages];

      // today filter
      if (showingToday) {
        filtered = filtered.filter(m => isToday(m.receivedAt));
      }

      // topic filter
      if (topic) {
        filtered = filtered.filter(m => m.topic && m.topic.toLowerCase() === topic);
      }

      // search filter
      if (query) {
        filtered = filtered.filter(m =>
          m.name.toLowerCase().includes(query)    ||
          m.email.toLowerCase().includes(query)   ||
          m.message.toLowerCase().includes(query)
        );
      }

      // sort
      filtered.sort((a, b) => sort === "oldest" ? a.id - b.id : b.id - a.id);

      // count label
      const label = showingToday ? "today's message(s)" : "message(s)";
      document.getElementById("count").textContent =
        filtered.length === (showingToday ? allMessages.filter(m => isToday(m.receivedAt)).length : allMessages.length)
          ? `${filtered.length} ${label} received`
          : `${filtered.length} of ${allMessages.length} message(s) shown`;

      // empty state
      if (filtered.length === 0) {
        box.innerHTML = `
          <div class="empty">
            <div style="font-size:2.5rem; margin-bottom:1rem;">📭</div>
            <div style="font-size:1.05rem; margin-bottom:0.4rem; color:rgba(255,255,255,0.5);">
              ${allMessages.length === 0 ? "No messages yet." : showingToday ? "No messages received today." : "No messages match your search."}
            </div>
            <div style="font-size:0.85rem; color:rgba(255,255,255,0.25);">
              ${allMessages.length === 0 ? "Messages from the contact form will appear here." : "Try clearing the filters."}
            </div>
          </div>`;
        return;
      }

      box.innerHTML = filtered.map(m => {
        const todayMsg = isToday(m.receivedAt);
        return `
        <div class="message-card ${todayMsg ? 'today' : ''}" id="msg-${m.id}">
          <div class="meta">
            <div>
              <div class="name">
                ${m.name}
                ${todayMsg ? '<span class="today-tag">Today</span>' : ''}
              </div>
              <div class="email">${m.email}</div>
            </div>
            <div class="time">${m.receivedAt}</div>
          </div>
          <span class="topic">${m.topic}</span>
          <div class="body">${m.message}</div>
          <button class="del-btn" onclick="deleteMsg(${m.id})">🗑 Delete</button>
        </div>`;
      }).join("");
    }

    // ── Clear search + today filter ────────────────
    function clearSearch() {
      showingToday = false;
      document.getElementById("searchInput").value = "";
      document.getElementById("filterTopic").value = "";
      document.getElementById("sortOrder").value   = "newest";
      renderMessages();
    }

    async function deleteMsg(id) {
      if (!confirm("Delete this message?")) return;
      await fetch(`/messages/${id}`, { method: "DELETE" });
      allMessages = allMessages.filter(m => m.id !== id);

      // update today banner count
      const todayMsgs = allMessages.filter(m => isToday(m.receivedAt));
      if (todayMsgs.length > 0) {
        document.getElementById("todayCount").textContent = todayMsgs.length;
      } else {
        document.getElementById("todayBanner").style.display = "none";
      }

      renderMessages();
    }

    async function clearAll() {
      if (!confirm("Delete ALL messages? This cannot be undone.")) return;
      await fetch("/messages/clear", { method: "DELETE" });
      allMessages = [];
      showingToday = false;
      document.getElementById("todayBanner").style.display = "none";
      renderMessages();
    }

    async function logout() {
      await fetch("/auth/logout", { method: "POST" });
      window.location.href = "/login";
    }

    loadMessages();
  </script>

</body>
</html>
