<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — TeleCompass</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #082e36;
      color: #fff;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.4rem; }

    button.logout {
      padding: 0.5rem 1.2rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button.logout:hover { background: rgba(255,255,255,0.1); }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .search-row input {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-row input::placeholder { color: rgba(255,255,255,0.35); }
    .search-row input:focus { border-color: #0c7576; }

    .search-row select {
      padding: 0.6rem 1rem;
      border-radius: 50px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.07);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .search-row select option { background: #082e36; }

    .btn-clear-search {
      padding: 0.6rem 1.2rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-clear-search:hover { background: rgba(255,255,255,0.08); }

    .count {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .message-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1rem;
    }

    .message-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .message-card .name  { font-weight: 700; font-size: 1rem; }
    .message-card .email { color: #0c7576; font-size: 0.85rem; }
    .message-card .time  { color: rgba(255,255,255,0.35); font-size: 0.78rem; }

    .message-card .topic {
      display: inline-block;
      background: rgba(12,117,118,0.3);
      border: 1px solid #0c7576;
      color: #7de8e8;
      font-size: 0.72rem;
      padding: 0.15rem 0.6rem;
      border-radius: 50px;
      margin-bottom: 0.6rem;
    }

    .message-card .body {
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .del-btn {
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.4);
      color: #ff6b6b;
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      font-size: 0.78rem;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    .del-btn:hover { background: rgba(255,80,80,0.3); }

    .clear-btn {
      margin-bottom: 1.5rem;
      padding: 0.5rem 1.4rem;
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.4);
      color: #ff6b6b;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .clear-btn:hover { background: rgba(255,80,80,0.3); }

    .empty {
      text-align: center;
      color: rgba(255,255,255,0.3);
      margin-top: 4rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>📬 TeleCompass — Admin</h1>
    <button class="logout" onclick="logout()">Logout →</button>
  </header>

  <button class="clear-btn" onclick="clearAll()">🗑 Clear All Messages</button>

  <!-- ── Search & Filter ── -->
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="🔍 Search by name, email or message…" oninput="renderMessages()"/>
    <select id="filterTopic" onchange="renderMessages()">
      <option value="">All Topics</option>
      <option value="general">General Inquiry</option>
      <option value="research">Research Collaboration</option>
      <option value="telecom">Telecom Feedback</option>
      <option value="other">Other</option>
    </select>
    <button class="btn-clear-search" onclick="clearSearch()">✕ Clear</button>
  </div>

  <div class="count" id="count"></div>
  <div id="messages"></div>

  <script>
    let allMessages = [];

    async function loadMessages() {
      const res = await fetch("/messages");
      if (res.status === 401) { window.location.href = "/login"; return; }
      const data = await res.json();
      allMessages = [...data.messages].reverse();
      renderMessages();
    }

    function renderMessages() {
      const query  = document.getElementById("searchInput").value.trim().toLowerCase();
      const topic  = document.getElementById("filterTopic").value.toLowerCase();
      const box    = document.getElementById("messages");

      let filtered = allMessages;

      // filter by topic
      if (topic) {
        filtered = filtered.filter(m => m.topic && m.topic.toLowerCase() === topic);
      }

      // filter by search query (name, email, message)
      if (query) {
        filtered = filtered.filter(m =>
          m.name.toLowerCase().includes(query)    ||
          m.email.toLowerCase().includes(query)   ||
          m.message.toLowerCase().includes(query)
        );
      }

      document.getElementById("count").textContent =
        filtered.length === allMessages.length
          ? `${allMessages.length} message(s) received`
          : `${filtered.length} of ${allMessages.length} message(s) shown`;

      if (filtered.length === 0) {
        box.innerHTML = '<p class="empty">No messages match your search.</p>';
        return;
      }

      box.innerHTML = filtered.map(m => `
        <div class="message-card" id="msg-${m.id}">
          <div class="meta">
            <div>
              <div class="name">${m.name}</div>
              <div class="email">${m.email}</div>
            </div>
            <div class="time">${m.receivedAt}</div>
          </div>
          <span class="topic">${m.topic}</span>
          <div class="body">${m.message}</div>
          <button class="del-btn" onclick="deleteMsg(${m.id})">🗑 Delete</button>
        </div>
      `).join("");
    }

    function clearSearch() {
      document.getElementById("searchInput").value = "";
      document.getElementById("filterTopic").value = "";
      renderMessages();
    }

    async function deleteMsg(id) {
      if (!confirm("Delete this message?")) return;
      await fetch(`/messages/${id}`, { method: "DELETE" });
      allMessages = allMessages.filter(m => m.id !== id);
      renderMessages();
    }

    async function clearAll() {
      if (!confirm("Delete ALL messages? This cannot be undone.")) return;
      await fetch("/messages/clear", { method: "DELETE" });
      allMessages = [];
      renderMessages();
    }

    async function logout() {
      await fetch("/auth/logout", { method: "POST" });
      window.location.href = "/login";
    }

    loadMessages();
  </script>

</body>
</html>
