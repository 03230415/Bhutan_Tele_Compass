<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — TeleCompass</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #082e36;
      font-family: 'DM Sans', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(15,224,182,0.2);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { color: #ffffff; font-size: 1.5rem; margin-bottom: 0.3rem; text-align: center; }
    p { color: rgba(255,255,255,0.5); font-size: 0.85rem; text-align: center; margin-bottom: 2rem; }
    label { display: block; color: rgba(255,255,255,0.7); font-size: 0.82rem; margin-bottom: 0.3rem; letter-spacing: 0.05em; text-transform: uppercase; }
    input {
      width: 100%; padding: 0.75rem 1rem; border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff; font-size: 0.95rem; margin-bottom: 1.2rem;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #0c7576; }
    button {
      width: 100%; padding: 0.8rem; background: #0c7576;
      border: none; border-radius: 50px; color: white;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #0d4f5c; }
    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧭 TeleCompass</h1>
    <p>Admin login — enter your credentials</p>

    <label>Username</label>
    <input type="text" id="username" placeholder="admin" />

    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button onclick="login()">Login →</button>
    <div class="error" id="errorMsg">Wrong username or password.</div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      const res  = await fetch("/auth/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location.href = "/admin";
      } else {
        document.getElementById("errorMsg").style.display = "block";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
