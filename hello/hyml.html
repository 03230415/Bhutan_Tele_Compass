<!DOCTYPE html>
<html>
<head>
<style>

@keyframes pop {
  from {
    transform: scale(0.8);
    opacity: 0;
  }

  to {
    transform: scale(1);
    opacity: 1;
  }
}

.box {
  width: 200px;
  padding: 20px;
  background: teal;
  color: white;
  margin: 100px auto;

  animation: pop 10s ease;
}

</style>
</head>

<body>

<div class="box">
  Hello Yangchen
</div>

</body>
</html>
